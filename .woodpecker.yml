steps:
  install:
    image: node:20-alpine
    commands:
      - corepack enable
      - corepack prepare pnpm@9 --activate
      - pnpm install --frozen-lockfile

  test:
    image: node:20-alpine
    commands:
      - corepack enable
      - corepack prepare pnpm@9 --activate
      - pnpm prisma generate
      - pnpm test

  lint:
    image: node:20-alpine
    commands:
      - corepack enable
      - corepack prepare pnpm@9 --activate
      - pnpm lint

  typecheck:
    image: node:20-alpine
    commands:
      - corepack enable
      - corepack prepare pnpm@9 --activate
      - pnpm prisma generate
      - pnpm exec tsc --noEmit

  build:
    image: node:20-alpine
    commands:
      - corepack enable
      - corepack prepare pnpm@9 --activate
      - pnpm prisma generate
      - pnpm build
