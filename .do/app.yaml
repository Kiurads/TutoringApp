# DigitalOcean App Platform spec (starting point — not yet applied against a
# real DO account/database). Apply with `doctl apps create --spec .do/app.yaml`
# or import via the App Platform dashboard, then fill in the SECRET env vars
# through the dashboard (this file intentionally carries no values, only
# keys/scopes — see .env.example for what each one is).
#
# Shape matches plan.md Phase 11C: one autoscaled `web` service, one
# single-instance `worker` (it's a polling loop with no distributed lock —
# never raise instance_count above 1), sharing one managed MySQL cluster.
name: estudyou
region: nyc

services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: Kiurads/TutoringApp
      branch: master
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 30
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: AUTH_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: AUTH_TRUST_HOST
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: STRIPE_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXTCLOUD_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXTCLOUD_USERNAME
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXTCLOUD_PASSWORD
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: RESEND_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: RESEND_FROM_EMAIL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET

workers:
  - name: worker
    dockerfile_path: worker/Dockerfile
    source_dir: /
    github:
      repo: Kiurads/TutoringApp
      branch: master
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: PORT
        scope: RUN_TIME
        value: "8081"

databases:
  - name: estudyou-db
    engine: MYSQL
    version: "8"
    production: true
    size: db-s-1vcpu-1gb
    num_nodes: 1
